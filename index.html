<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <!-- Balance Display -->
    <div id="balance-display">
      <span id="balance-value"></span>
    </div>

    <!-- Input Form -->
    <form id="input-form" novalidate>

      <div class="field-group">
        <label for="item-name">Item Name</label>
        <input type="text" id="item-name" name="item-name" autocomplete="off" />
        <span class="error-msg" id="name-error"></span>
      </div>

      <div class="field-group">
        <label for="amount">Amount</label>
        <input type="number" step="0.01" id="amount" name="amount" />
        <span class="error-msg" id="amount-error"></span>
      </div>

      <div class="field-group">
        <label for="category">Category</label>
        <select id="category" name="category">
          <option value="">-- Select --</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Fun">Fun</option>
        </select>
        <span class="error-msg" id="category-error"></span>
      </div>

      <button type="submit" id="add-btn">Add Transaction</button>

    </form>

    <!-- Pie Chart -->
    <div id="chart-wrapper">
      <canvas id="spending-chart"></canvas>
    </div>

    <!-- Transaction List -->
    <ul id="transaction-list"></ul>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="js/app.js"></script>

  </body>
</html>

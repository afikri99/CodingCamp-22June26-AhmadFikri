<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- Header with Theme Toggle -->
  <header id="app-header">
    <h1>Expense Tracker</h1>
    <button id="theme-toggle" class="theme-btn" aria-label="Toggle dark/light mode">
      <span class="sun-icon">☀️</span>
      <span class="moon-icon">🌙</span>
    </button>
  </header>

  <!-- Balance Display -->
  <div id="balance-display">
    <span id="balance-label">Total Spending</span>
    <span id="balance-value"></span>
  </div>

  <!-- Monthly Summary & Controls -->
  <div id="controls-section">
    <div class="control-row">
      <div class="control-group">
        <label for="month-filter">Month</label>
        <select id="month-filter">
          <option value="">All Time</option>
        </select>
      </div>
      <div class="control-group">
        <label for="sort-by">Sort By</label>
        <select id="sort-by">
          <option value="date-desc">Newest First</option>
          <option value="date-asc">Oldest First</option>
          <option value="amount-desc">Highest Amount</option>
          <option value="amount-asc">Lowest Amount</option>
          <option value="category-asc">Category (A-Z)</option>
        </select>
      </div>
    </div>

    <!-- Monthly Summary -->
    <div id="monthly-summary" class="summary-card">
      <h3>Monthly Summary</h3>
      <div id="summary-content"></div>
    </div>
  </div>

  <!-- Spending Limit Section -->
  <div id="limit-section" class="summary-card">
    <div class="limit-header">
      <h3>Monthly Spending Limit</h3>
      <button id="edit-limit-btn" class="small-btn">Set Limit</button>
    </div>
    <div id="limit-display">
      <div class="limit-bar">
        <div id="limit-progress" class="limit-progress"></div>
      </div>
      <div class="limit-info">
        <span id="limit-spent">Rp 0</span>
        <span id="limit-total">No limit set</span>
      </div>
    </div>
    <div id="limit-form" class="hidden">
      <input type="text" id="limit-input" placeholder="e.g. 5.000.000" inputmode="numeric" />
      <button id="save-limit-btn" class="small-btn primary">Save</button>
      <button id="cancel-limit-btn" class="small-btn">Cancel</button>
    </div>
  </div>

  <!-- Input Form -->
  <form id="input-form" novalidate>

    <div class="field-group">
      <label for="item-name">Item Name</label>
      <input type="text" id="item-name" name="item-name" autocomplete="off" />
      <span class="error-msg" id="name-error"></span>
    </div>

    <div class="field-group">
      <label for="amount">Amount</label>
      <input type="text" id="amount" name="amount" inputmode="numeric" autocomplete="off" placeholder="0" />
      <span class="error-msg" id="amount-error"></span>
    </div>

    <div class="field-group">
      <label for="category">Category</label>
      <div class="category-row">
        <select id="category" name="category">
          <option value="">-- Select --</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Fun">Fun</option>
        </select>
        <button type="button" id="add-category-btn" class="small-btn" aria-label="Add custom category">+</button>
      </div>
      <span class="error-msg" id="category-error"></span>
    </div>

    <button type="submit" id="add-btn">Add Transaction</button>

  </form>

  <!-- Custom Category Modal -->
  <div id="category-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Add Custom Category</h3>
      <div class="field-group">
        <label for="new-category-name">Category Name</label>
        <input type="text" id="new-category-name" autocomplete="off" maxlength="20" />
        <span class="error-msg" id="category-name-error"></span>
      </div>
      <div class="field-group">
        <label>Category Color</label>
        <div id="color-picker" class="color-options">
          <button type="button" class="color-option" data-color="#FF6384" style="background-color: #FF6384;"
            aria-label="Red"></button>
          <button type="button" class="color-option" data-color="#36A2EB" style="background-color: #36A2EB;"
            aria-label="Blue"></button>
          <button type="button" class="color-option" data-color="#FFCE56" style="background-color: #FFCE56;"
            aria-label="Yellow"></button>
          <button type="button" class="color-option" data-color="#4BC0C0" style="background-color: #4BC0C0;"
            aria-label="Teal"></button>
          <button type="button" class="color-option" data-color="#9966FF" style="background-color: #9966FF;"
            aria-label="Purple"></button>
          <button type="button" class="color-option" data-color="#FF9F40" style="background-color: #FF9F40;"
            aria-label="Orange"></button>
          <button type="button" class="color-option" data-color="#C9CBCF" style="background-color: #C9CBCF;"
            aria-label="Gray"></button>
          <button type="button" class="color-option" data-color="#E67E22" style="background-color: #E67E22;"
            aria-label="Brown"></button>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" id="cancel-category-btn" class="small-btn">Cancel</button>
        <button type="button" id="save-category-btn" class="small-btn primary">Add Category</button>
      </div>
    </div>
  </div>

  <!-- Transaction List -->
  <ul id="transaction-list"></ul>

  <!-- Pie Chart -->
  <div id="chart-wrapper">
    <canvas id="spending-chart"></canvas>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="js/app.js"></script>

</body>

</html>
